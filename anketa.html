<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заява до лав ОУН</title>
    <style>
        body { background-color: #e3effd; font-family: "Courier New", Courier, monospace; padding: 15px; margin: 0; }
        .form-container { background: #f0f7ff; padding: 25px; border: 1px solid #adc5e0; border-radius: 8px; max-width: 550px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .emblem-header { text-align: center; margin-bottom: 15px; }
        .emblem-header img { width: 120px; height: 120px; border-radius: 50%; object-fit: contain; background: #fff; border: 2px solid #1a3a5f; padding: 5px; }
        .header-text { text-align: center; font-weight: bold; font-size: 24px; color: #1a3a5f; margin-bottom: 10px; text-transform: uppercase; }
        
        /* Стиль для плеєра */
        .audio-control {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: #1a3a5f;
            color: white;
            padding: 10px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .statement-box { background: #fff; border: 1px solid #adc5e0; padding: 20px; margin-bottom: 25px; font-style: italic; line-height: 1.8; color: #1a3a5f; font-size: 17px; border-left: 5px solid #1a3a5f; }
        .inline-input { border: none; border-bottom: 2px solid #d32f2f; outline: none; font-family: inherit; font-size: 18px; font-weight: bold; color: #d32f2f; width: 220px; background: transparent; text-align: center; }
        
        .section-title { background: #1a3a5f; color: #fff; padding: 10px; margin-top: 25px; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #2c3e50; font-size: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #adc5e0; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 16px; }
        
        .submit-btn { width: 100%; padding: 18px; background: #1a3a5f; color: white; border: none; font-weight: bold; margin-top: 25px; cursor: pointer; border-radius: 4px; font-size: 18px; text-transform: uppercase; }
        .footer-copyright { text-align: center; margin-top: 40px; padding: 20px 0; font-size: 12px; color: #7f8c8d; border-top: 1px solid #adc5e0; }
    </style>
</head>
<body>

<div class="audio-control" id="musicBtn" onclick="toggleMusic()">
    <span>🎵</span> <span id="btnText">УВІМКНУТИ ГІМН</span>
</div>

<audio id="hymn" loop>
    <source src="g-mn-oun-upa-zrodilis-mi-veliko-godini.mp3" type="audio/mpeg">
</audio>

<div class="form-container">
    <div class="emblem-header">
        <img src="https://raw.githubusercontent.com/providnykzpoun-bit/Anketa/main/IMG_20260426_155837_907.jpg" alt="Герб ОУН">
    </div>
    <div class="header-text">🇺🇦 ЗАЯВА</div>

    <div class="statement-box">
        Прошу прийняти мене, 
        <input type="text" id="name" class="inline-input" placeholder="Прізвище та Ім'я" required> 
        до лав Організації Українських Націоналістів (ОУН). Зобов’язуюсь вірно служити Українській Нації.
    </div>
    
    <form id="anketa">
        <div class="section-title">🇺🇦 I. ПЕРСОНАЛЬНІ ДАНІ</div>
        <label>🚩 Псевдо:</label> <input type="text" id="psevdo" required>
        <label>📅 Дата народження:</label> <input type="date" id="birth" required>
        <label>🏠 Адреса проживання:</label> <input type="text" id="address" required>
        <label>💍 Сімейний стан:</label> <input type="text" id="family">
        <label>🎗 Партійність:</label> <input type="text" id="party" placeholder="Безпартійний">

        <div class="section-title">🇺🇦 II. ДОСВІД ТА ЗВ'ЯЗОК</div>
        <label>🎓 Освіта:</label> <input type="text" id="edu">
        <label>🎖 Нагороди:</label> <input type="text" id="awards">
        <label>🛠 Спеціальні навички:</label> <textarea id="skills" rows="2"></textarea>
        <label>📱 Соціальні мережі (посилання):</label> <input type="text" id="social" placeholder="facebook.com/yourname">
        <label>📞 Номер телефону:</label> <input type="tel" id="phone" value="+" required oninput="this.value = '+' + this.value.replace(/[^0-9]/g, '')">

        <div class="section-title">🇺🇦 III. РЕКОМЕНДАЦІЇ ДО ЛАВ ОУН</div>
        <label>🤝 Рекомендує (1):</label> <input type="text" id="ref1">
        <label>🤝 Рекомендує (2):</label> <input type="text" id="ref2">

        <button type="submit" class="submit-btn">🇺🇦 ВІДПРАВИТИ ЗАЯВУ</button>
    </form>

    <div class="footer-copyright">
        &copy; 2026 Організація Українських Націоналістів. Всі права захищені ОУН.
    </div>
</div>

<script>
    // Логіка музики
    const audio = document.getElementById('hymn');
    const btnText = document.getElementById('btnText');

    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            btnText.innerText = "ВИМКНУТИ ГІМН";
        } else {
            audio.pause();
            btnText.innerText = "УВІМКНУТИ ГІМН";
        }
    }

    // Логіка відправки
    document.getElementById('anketa').onsubmit = function(e) {
        e.preventDefault();
        
        const d = {
            n: document.getElementById('name').value,
            p: document.getElementById('psevdo').value,
            b: document.getElementById('birth').value,
            a: document.getElementById('address').value,
            f: document.getElementById('family').value,
            pr: document.getElementById('party').value || "Безпартійний",
            e: document.getElementById('edu').value,
            aw: document.getElementById('awards').value,
            s: document.getElementById('skills').value,
            soc: document.getElementById('social').value,
            ph: document.getElementById('phone').value,
            r1: document.getElementById('ref1').value,
            r2: document.getElementById('ref2').value
        };

        const text = `🇺🇦 НОВА ЗАЯВА ДО ОУН\n\n` +
            `Я, ${d.n}, прошу прийняти мене до лав ОУН.\n\n` +
            `🚩 Псевдо: ${d.p}\n` +
            `📅 Дата нар: ${d.b}\n` +
            `🏠 Адреса: ${d.a}\n` +
            `💍 Стан: ${d.f}\n` +
            `🎗 Партійність: ${d.pr}\n` +
            `🎓 Освіта: ${d.e}\n` +
            `🎖 Нагороди: ${d.aw}\n` +
            `🛠 Навички: ${d.s}\n` +
            `📱 Соцмережі: ${d.soc}\n` +
            `📞 Тел: ${d.ph}\n\n` +
            `🤝 РЕКОМЕНДАЦІЇ:\n` +
            `1. ${d.r1}\n` +
            `2. ${d.r2}\n\n` +
            `📅 Дата заповнення: ${new Date().toLocaleDateString()}`;

        window.location.href = `https://t.me/old_solo_way?text=${encodeURIComponent(text)}`;
    };
</script>
</body>
</html>
