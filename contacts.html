<!DOCTYPE html>

<head>

    <title>Контакти ОУН</title>
    <style>
        body { background-color: #05101c; color: #f0f4f8; font-family: "Courier New", Courier, monospace; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .floating-back {

        .off-link {

            border: 1px solid #1e3a5f; padding: 15px 25px; display: inline-block;
            transition: 0.3s; background: rgba(30, 58, 95, 0.2);
        }

        .off-link:hover { border-color: #ffd700; color: #ffd700; background: rgba(255, 215, 0, 0.05); }
