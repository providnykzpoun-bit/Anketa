<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета ОУН</title>
    <style>
        body { background-color: #e3effd; font-family: sans-serif; padding: 15px; }
        .form-container { background: #f0f7ff; padding: 20px; border: 1px solid #adc5e0; border-radius: 8px; max-width: 500px; margin: auto; }
        .header-text { text-align: center; font-weight: bold; font-size: 20px; color: #1a3a5f; margin-bottom: 20px; }
        .section-title { background: #1a3a5f; color: #fff; padding: 10px; margin-top: 20px; font-weight: bold; text-transform: uppercase; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #2c3e50; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #adc5e0; border-radius: 4px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: #1a3a5f; color: white; border: none; font-weight: bold; margin-top: 30px; cursor: pointer; border-radius: 4px; }
        .photo-msg { font-size: 13px; color: #555; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-text">АНКЕТА КАНДИДАТА В ОУН</div>
    <form id="mainForm">
        <div class="section-title">I. ПЕРСОНАЛЬНІ ВІДОМОСТІ</div>
        <label>Псевдо:</label> <input type="text" id="psevdo" required>
        <label>ПІБ (справжнє):</label> <input type="text" id="name" required>
        <label>Телефон:</label> <input type="tel" id="phone" required>
        <label>Місце проживання:</label> <input type="text" id="address">
        
        <div class="section-title">II. РЕКОМЕНДАЦІЇ ТА ДОСВІД</div>
        <label>Хто надав рекомендації (2 особи):</label> <textarea id="refs" rows="2"></textarea>
        <label>Державні нагороди:</label> <textarea id="awards" rows="2"></textarea>
        
        <div class="section-title">III. ЗОБОВ'ЯЗАННЯ</div>
        <label>Готовність виконувати накази:</label> <input type="text" id="loyalty" placeholder="Так/Ні">

        <p class="photo-msg">⚠️ Фото додайте, будь ласка, окремим файлом у повідомленні в Telegram.</p>
        
        <button type="submit" class="submit-btn">ПОДАТИ ЗАЯВУ ЧЕРЕЗ TELEGRAM</button>
    </form>
</div>

<script>
    document.getElementById('mainForm').onsubmit = function(e) {
        e.preventDefault();
        
        // Збираємо дані
        const psevdo = document.getElementById('psevdo').value;
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;
        const refs = document.getElementById('refs').value;
        const awards = document.getElementById('awards').value;
        const loyalty = document.getElementById('loyalty').value;

        // Формуємо текст повідомлення
        const fullText = `СЛАВА УКРАЇНІ!\nПодаю анкету кандидата:\n\n` +
                         `📌 Псевдо: ${psevdo}\n` +
                         `👤 ПІБ: ${name}\n` +
                         `📞 Тел: ${phone}\n` +
                         `🏠 Адреса: ${address}\n` +
                         `🎖 Нагороди: ${awards}\n` +
                         `🤝 Рекомендації: ${refs}\n` +
                         `⚔️ Готовність: ${loyalty}`;

        const encodedText = encodeURIComponent(fullText);
        
        // Відкриваємо чат з вами
        window.location.href = `https://t.me/Leslav?text=${encodedText}`;
    };
</script>

</body>
</html>
