<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОУН — Державна Традиція</title>
    <style>
        body { background-color: #05101c; color: #f0f4f8; font-family: "Courier New", Courier, monospace; margin: 0; padding: 0; }
        
        .hero-section { 
            background: linear-gradient(rgba(5,16,28,0.8), rgba(5,16,28,0.8)), 
                        url('https://raw.githubusercontent.com/providnykzpoun-bit/Anketa/main/IMG_20260426_155837_907.jpg'); 
            background-size: cover; background-position: center; padding: 60px 20px; text-align: center; border-bottom: 3px solid #ffd700;
        }

        .main-title { border: 2px solid #ffd700; display: inline-block; padding: 20px 40px; background: rgba(5,16,28,0.6); }
        .main-title h1 { margin: 0; font-size: 26px; color: #ffd700; letter-spacing: 3px; text-transform: uppercase; }

        .content-container { max-width: 1000px; margin: auto; padding: 40px 20px; text-align: center; }

        /* Сітка на 4 блоки */
        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            margin: 40px 0;
        }

        .nav-block { 
            border: 2px solid #ffd700; padding: 30px 15px; background: rgba(30,58,95,0.15); 
            text-decoration: none; transition: 0.4s; border-radius: 8px; display: block;
        }

        .nav-block:hover { background: rgba(30,58,95,0.4); box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }

        .nav-icon { font-size: 40px; color: #ffd700; margin-bottom: 15px; display: block; }
        .nav-block h3 { color: #ffd700; margin: 5px 0; font-size: 18px; text-transform: uppercase; }
        .nav-block p { color: #fff; font-size: 11px; margin: 10px 0 0; opacity: 0.8; text-transform: uppercase; }

        .enter-btn { 
            background: #004a99; color: #ffd700; padding: 18px 50px; text-decoration: none; 
            font-weight: bold; font-size: 20px; border: 2px solid #ffd700; display: inline-block; 
            transition: 0.4s; text-transform: uppercase; border-radius: 5px; margin-top: 20px;
        }
        .enter-btn:hover { background: #ffd700; color: #05101c; }

        footer { text-align: center; color: #5a7b9c; padding: 40px; font-size: 11px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="main-title">
        <h1>БОГ — НАЦІЯ — ДЕРЖАВА</h1>
        <p>ОРГАНІЗАЦІЯ УКРАЇНСЬКИХ НАЦІОНАЛІСТІВ</p>
    </div>
</div>

<div class="content-container">
    <div class="nav-grid">
        <a href="pantheon.html" class="nav-block">
            <span class="nav-icon">🏛</span>
            <h3>ПАНТЕОН</h3>
            <p>Герої Нації</p>
        </a>

        <a href="rules.html" class="nav-block">
            <span class="nav-icon">📖</span>
            <h3>КОДЕКС</h3>
            <p>Правила життя</p>
        </a>

        <a href="today.html" class="nav-block">
            <span class="nav-icon">🛡</span>
            <h3>СЬОГОДЕННЯ</h3>
            <p>Сучасна боротьба</p>
        </a>

        <a href="contacts.html" class="nav-block">
            <span class="nav-icon">✉</span>
            <h3>КОНТАКТИ</h3>
            <p>Зворотний зв'язок</p>
        </a>
    </div>

    <div class="cta-section">
        <a href="anketa.html" class="enter-btn">ЗАПОВНИТИ ЗАЯВУ</a>
    </div>
</div>

<footer>© 2026 ОУН | ЧЕСТЬ ТА ЧИН</footer>

</body>
</html>
