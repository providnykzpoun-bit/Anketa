<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета Кандидата в ОУН</title>
    <style>
        body {
            background-color: #e0d7c6;
            font-family: "Courier New", Courier, monospace;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            background-color: #f4f1ea;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border: 1px solid #b5a489;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }
        h1 { text-align: center; text-transform: uppercase; font-size: 24px; }
        .motto { text-align: center; font-style: italic; margin-bottom: 30px; font-weight: bold; }
        .section-title {
            background: #333;
            color: #fff;
            padding: 5px 10px;
            margin-top: 20px;
            font-weight: bold;
        }
        .field { margin: 15px 0; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            border: none;
            border-bottom: 1px dotted #333;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            padding: 5px 0;
        }
        input:focus { outline: none; border-bottom: 1px solid #000; }
        .checkbox-group { margin: 15px 0; }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #333;
            color: white;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 30px;
        }
        .submit-btn:hover { background: #000; }
        .stamp {
            position: absolute;
            bottom: 100px;
            right: 40px;
            border: 3px double #900;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #900;
            opacity: 0.4;
            transform: rotate(-15deg);
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1>Анкета Кандидата</h1>
    <p class="motto">«Здобудеш Українську Державу, або згинеш у боротьбі за Неї»</p>

    <form id="anketaForm">
        <div class="section-title">I. ПЕРСОНАЛЬНІ ВІДОМОСТІ</div>
        <div class="field">
            <label>Бажане псевдо:</label>
            <input type="text" name="psevdo" required>
        </div>
        <div class="field">
            <label>ПІБ (справжнє):</label>
            <input type="text" name="name" required>
        </div>
        <div class="field">
            <label>Дата народження:</label>
            <input type="date" name="birthdate">
        </div>

        <div class="section-title">II. ІДЕОЛОГІЯ ТА ВИШКІЛ</div>
        <div class="field">
            <label>Чи готові Ви до беззастережного виконання наказів?</label>
            <input type="text" name="loyalty" placeholder="Так/Ні">
        </div>
        <div class="field">
            <label>Спеціальні навички (зброя, медицина, зв'язок):</label>
            <textarea name="skills" rows="3"></textarea>
        </div>

        <button type="submit" class="submit-btn">Подати заяву до Проводу</button>
    </form>

    <div class="stamp">РЕФЕРЕНТУРА<br>БЕЗПЕКИ<br>ОУН</div>
</div>

<script>
    // Це місце для майбутнього підключення до Telegram API
    document.getElementById('anketaForm').onsubmit = function(e) {
        e.preventDefault();
        alert('Анкету прийнято! Дані будуть передані через захищений канал.');
    };
</script>

</body>
</html>
