<!DOCTYPE html>

<head>

    <title>ОУН — Організація Українських Націоналістів</title>
    <style>
        body { 
            background-color: #05101c; 
            color: #f0f4f8; 
            font-family: "Courier New", Courier, monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .hero-section { 
            text-align: center; 
            border: 3px solid #ffd700; 
            padding: 50px; 
            background: rgba(10, 30, 54, 0.9); 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            max-width: 500px;
            width: 90%;
        }
        
        h1 { color: #ffd700; font-size: 40px; letter-spacing: 5px; margin-bottom: 10px; text-transform: uppercase; }
        .subtitle { color: #ffd700; font-size: 14px; letter-spacing: 2px; margin-bottom: 40px; font-weight: bold; }

        .main-nav { display: flex; flex-direction: column; gap: 15px; }

        .nav-btn { 
            background: #004a99; 
            color: #ffd700; 
            padding: 15px 30px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 16px; 
            border: 2px solid #ffd700; 
            transition: 0.3s; 
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
        }

        .nav-btn:hover { 
            background: #ffd700; 
            color: #05101c; 
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        footer { position: absolute; bottom: 20px; color: #5a7b9c; font-size: 10px; letter-spacing: 2px; text-align: center; }
    </style>
</head>
