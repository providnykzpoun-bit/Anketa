<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета Кандидата в ОУН</title>
    <style>
        body {
            background-color: #e3effd; 
            font-family: "Courier New", Courier, monospace;
            display: flex;
            justify-content: center;
            padding: 10px;
            margin: 0;
        }
        .form-container {
            background-color: #f0f7ff;
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            border: 1px solid #adc5e0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .emblem-header {
            text-align: center;
            margin-bottom: 15px;
        }
        .emblem-header img {
            width: 90px;
            height: auto;
        }
        .photo-upload-container {
            text-align: center;
            margin-bottom: 25px;
        }
        .photo-preview {
            width: 150px;
            height: 180px;
            border: 2px dashed #adc5e0;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            margin: 0 auto 10px auto;
            cursor: pointer;
            overflow: hidden;
        }
        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #photo-input { display: none; }
        .upload-btn-label {
            background-color: #1a3a5f;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
        }
        .header-text {
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #1a3a5f;
        }
        .section-title {
            background: #1a3a5f;
            color: #fff;
            padding: 8px 12px;
            margin-top: 25px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
        }
        .field { margin: 18px 0; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        input, textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #1a3a5f;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            padding: 5px 0;
            box-sizing: border-box;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: #1a3a5f;
            color: white;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 35px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="emblem-header">
        <img src="images.jpeg" alt="Емблема">
    </div>

    <div class="header-text">Анкета кандидата в ОУН</div>

    <form action="https://formspree.io/f/ВАШ_ID_ТУТ" method="POST" enctype="multipart/form-data">
        
        <div class="photo-upload-container">
            <div class="photo-preview" onclick="document.getElementById('photo-input').click()">
                <span id="placeholder">Додати фото</span>
                <img id="preview-img" src="">
            </div>
            <input type="file" id="photo-input" name="ФОТО_КАНДИДАТА" accept="image/*" required>
            <label for="photo-input" class="upload-btn-label">Вибрати файл</label>
        </div>

        <div class="section-title">I. Персональні дані</div>
        <div class="field"><label>Псевдо:</label><input type="text" name="Псевдо" required></div>
        <div class="field"><label>ПІБ:</label><input type="text" name="ПІБ" required></div>
        <div class="field"><label>Дата народження:</label><input type="date" name="Дата_народження"></div>
        <div class="field"><label>Місце проживання:</label><input type="text" name="Адреса"></div>
        <div class="field"><label>Сімейний стан:</label><input type="text" name="Сімейний_стан"></div>
        <div class="field"><label>Партійність:</label><input type="text" name="Партійність"></div>

        <div class="section-title">II. Зв'язок</div>
        <div class="field"><label>Телефон:</label><input type="tel" name="Телефон" required></div>
        <div class="field"><label>Месенджери:</label><input type="text" name="Месенджери"></div>

        <div class="section-title">III. Досвід</div>
        <div class="field"><label>Освіта:</label><input type="text" name="Освіта"></div>
        <div class="field"><label>Нагороди:</label><textarea name="Нагороди"></textarea></div>
        <div class="field"><label>Навички:</label><textarea name="Навички"></textarea></div>

        <div class="section-title">IV. Рекомендації</div>
        <div class="field"><label>Рекомендація №1:</label><input type="text" name="Рекомендація_1"></div>
        <div class="field"><label>Рекомендація №2:</label><input type="text" name="Рекомендація_2"></div>

        <div class="section-title">V. Дата</div>
        <div class="field"><label>Дата заповнення:</label><input type="date" name="Дата_заповнення" required></div>

        <button type="submit" class="submit-btn">ВІДПРАВИТИ АНКЕТУ</button>
    </form>
</div>

<script>
    const input = document.getElementById('photo-input');
    const preview = document.getElementById('preview-img');
    const placeholder = document.getElementById('placeholder');

    input.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                placeholder.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    });
</script>

</body>
</html>
