<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета Кандидата в ОУН</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #e3effd; 
            font-family: "Courier New", Courier, monospace;
            display: flex;
            justify-content: center;
            padding: 10px;
            margin: 0;
        }
        .form-container {
            background-color: #f0f7ff;
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            border: 1px solid #adc5e0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .emblem-header {
            text-align: center;
            margin-bottom: 15px;
        }
        .emblem-header img {
            width: 90px;
            height: auto;
        }
        
        /* Стилі для блоку завантаження фото */
        .photo-upload-container {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }
        .photo-preview {
            width: 150px;
            height: 180px; /* Пропорції для паспортного фото */
            border: 2px dashed #adc5e0;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            margin: 0 auto 10px auto;
            cursor: pointer;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .photo-preview img {
            max-width: 100%;
            max-height: 100%;
            display: none; /* Спочатку ховаємо */
        }
        #photo-input {
            display: none; /* Ховаємо стандартну кнопку */
        }
        .upload-btn-label {
            background-color: #1a3a5f;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
        }
        .upload-btn-label:hover { background-color: #0056b3; }

        .header-text {
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #1a3a5f;
        }
        .section-title {
            background: #1a3a5f;
            color: #fff;
            padding: 8px 12px;
            margin-top: 25px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
        }
        .field { margin: 18px 0; }
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 5px; 
            font-size: 15px;
            color: #2c3e50;
        }
        input[type="text"], input[type="date"], input[type="email"], input[type="tel"], textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #1a3a5f;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            padding: 5px 0;
            box-sizing: border-box;
        }
        input:focus, textarea:focus { outline: none; border-bottom: 2px solid #0056b3; }
        
        .submit-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: #1a3a5f;
            color: white;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 35px;
            font-size: 16px;
        }
        .submit-btn:hover { background: #000; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="emblem-header">
        <img src="images.jpeg" alt="Емблема ОУН">
    </div>

    <div class="header-text">Анкета кандидата в ОУН</div>

    <form id="anketaForm">
        <div class="photo-upload-container">
            <div class="photo-preview" id="photo-preview-box" onclick="document.getElementById('photo-input').click()">
                <span id="upload-placeholder">Натисніть,<br>щоб додати фото</span>
                <img id="photo-img-src" src="#" alt="Фото кандидата">
            </div>
            <input type="file" id="photo-input" name="candidate_photo" accept="image/*" required>
            <label for="photo-input" class="upload-btn-label">Завантажити фото</label>
        </div>

        <div class="section-title">I. ПЕРСОНАЛЬНІ ВІДОМОСТІ</div>
        
        <div class="field">
            <label>Бажане псевдо ОУН:</label>
            <input type="text" name="psevdo" required>
        </div>

        <div class="field">
            <label>ПІБ (справжнє):</label>
            <input type="text" name="name" required>
        </div>

        <div class="field">
            <label>Дата народження:</label>
            <input type="date" name="birthdate">
        </div>

        <div class="field">
            <label>Місце проживання:</label>
            <input type="text" name="address">
        </div>

        <div class="field">
            <label>Сімейний стан:</label>
            <input type="text" name="family_status">
        </div>

        <div class="field">
            <label>Партійність:</label>
            <input type="text" name="party_status">
        </div>

        <div class="section-title">II. ЗВ'ЯЗОК ТА КОНТАКТИ</div>

        <div class="field">
            <label>Телефон:</label>
            <input type="tel" name="phone" required>
        </div>

        <div class="field">
            <label>Месенджери (Viber, WhatsApp, Telegram):</label>
            <input type="text" name="messengers">
        </div>

        <div class="section-title">III. ДОСВІД ТА НАГОРОДИ</div>

        <div class="field">
            <label>Освіта та спеціальність:</label>
            <input type="text" name="education">
        </div>

        <div class="field">
            <label>Державни нагороди:</label>
            <textarea name="awards" rows="2"></textarea>
        </div>

        <div class="field">
            <label>Спеціальні навички:</label>
            <textarea name="skills" rows="2"></textarea>
        </div>

        <div class="section-title">IV. РЕКОМЕНДАЦІЇ</div>
        
        <div class="field">
            <label>Рекомендація (член ОУН №1):</label>
            <input type="text" name="ref1">
        </div>

        <div class="field">
            <label>Рекомендація (член ОУН №2):</label>
            <input type="text" name="ref2">
        </div>

        <div class="section-title">V. ЗОБОВ'ЯЗАННЯ</div>

        <div class="field">
            <label>Чи готові Ви до виконання наказів Проводу?</label>
            <input type="text" name="loyalty">
        </div>

        <div class="field">
            <label>Дата заповнення:</label>
            <input type="date" name="filling_date" required>
        </div>

        <button type="submit" class="submit-btn">Подати заяву</button>
    </form>
</div>

<script>
    // Скрипт для показу фото після завантаження
    const photoInput = document.getElementById('photo-input');
    const photoPreviewBox = document.getElementById('photo-preview-box');
    const photoImgSrc = document.getElementById('photo-img-src');
    const uploadPlaceholder = document.getElementById('upload-placeholder');

    photoInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.addEventListener('load', function() {
                // Показуємо картинку в блоці
                photoImgSrc.setAttribute('src', this.result);
                photoImgSrc.style.display = 'block';
                uploadPlaceholder.style.display = 'none';
                photoPreviewBox.style.borderStyle = 'solid'; // Змінюємо рамку
            });
            reader.readAsDataURL(file);
        }
    });

    // Код для Telegram Web App
    const tg = window.Telegram.WebApp;
    if (tg) tg.expand();

    document.getElementById('anketaForm').onsubmit = function(e) {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        // Важливо: завантажене фото (файл) не можна передати 
        // через стандартний tg.sendData у JSON. 
        // Потрібно використовувати Bot API з боку сервера.
        
        if (tg && tg.sendData) {
            tg.sendData(JSON.stringify({ ...data, has_photo: true }));
        } else {
            alert('Дані та фото збережено (локальний тест)');
            console.log(data);
        }
    };
</script>

</body>
</html>
