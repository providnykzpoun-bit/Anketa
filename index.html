<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета Кандидата в ОУН</title>
    <style>
        body {
            background-color: #dcd3c1;
            font-family: "Courier New", Courier, monospace;
            display: flex;
            justify-content: center;
            padding: 10px;
            margin: 0;
        }
        .form-container {
            background-color: #f2ede4;
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            border: 1px solid #b5a489;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .emblem-header {
            text-align: center;
            margin-bottom: 10px;
        }
        .emblem-header img {
            width: 100px;
            height: auto;
        }
        .header-text {
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .section-title {
            background: #333;
            color: #fff;
            padding: 8px 12px;
            margin-top: 25px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
        }
        .field { margin: 18px 0; }
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 5px; 
            font-size: 16px;
        }
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #333;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            padding: 5px 0;
            box-sizing: border-box;
        }
        input:focus, textarea:focus { outline: none; border-bottom: 2px solid #000; }
        
        .submit-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: #333;
            color: white;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 35px;
            font-size: 16px;
        }
        .submit-btn:hover { background: #000; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="emblem-header">
        <img src="images.jpeg" alt="Емблема ОУН">
    </div>
    
    <div class="header-text">Анкета кандидата в ОУН</div>

    <form id="anketaForm">
        <div class="section-title">I. ПЕРСОНАЛЬНІ ВІДОМОСТІ</div>
        
        <div class="field">
            <label>Бажане псевдо ОУН:</label>
            <input type="text" name="psevdo" required>
        </div>

        <div class="field">
            <label>ПІБ (справжнє):</label>
            <input type="text" name="name" required>
        </div>

        <div class="field">
            <label>Дата народження:</label>
            <input type="date" name="birthdate">
        </div>

        <div class="section-title">II. ІДЕОЛОГІЯ ТА ВИШКІЛ</div>

        <div class="field">
            <label>Чи готові Ви до беззастережного виконання наказів?</label>
            <input type="text" name="loyalty" placeholder="Так/Ні">
        </div>

        <div class="field">
            <label>Спеціальні навички:</label>
            <textarea name="skills" rows="3" placeholder="Зброя, медицина, зв'язок..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Подати заяву</button>
    </form>
</div>

<script>
    document.getElementById('anketaForm').onsubmit = function(e) {
        e.preventDefault();
        alert('Анкету відправлено на розгляд Проводу.');
    };
</script>

</body>
</html>
